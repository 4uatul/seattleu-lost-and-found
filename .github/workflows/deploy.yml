# This file tells GitHub: "When code is pushed to main, run these steps automatically."
# It lives at .github/workflows/deploy.yml in your repo.
# GitHub looks for YAML files in this exact folder to find workflow definitions.

name: Deploy SeattleU Lost & Found

# WHEN to run this workflow
# "on push to main" means: every time you push code to the main branch, this runs.
# You could also trigger on pull requests, schedules, or manual button clicks.
on:
  push:
    branches: [main]

# WHAT to run
# Jobs run in parallel by default. We have two: frontend and backend.
# Each job gets its own fresh Linux server (called a "runner") provided by GitHub for free.
jobs:

  # ============================================================
  # JOB 1: Build and deploy the React frontend to S3 + CloudFront
  # ============================================================
  deploy-frontend:
    runs-on: ubuntu-latest    # GitHub gives us a fresh Ubuntu machine

    steps:
      # Step 1: Download your code onto the runner
      # Without this, the runner is an empty machine with no code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Node.js (needed for npm run build)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Step 3: Install dependencies (react, react-router-dom, etc.)
      - name: Install dependencies
        run: cd frontend && npm install

      # Step 4: Build the React app (creates the dist/ folder)
      # The .env.production file in your repo sets VITE_API_URL=
      - name: Build
        run: cd frontend && npm run build

      # Step 5: Give the runner AWS credentials so it can upload to S3
      # The secrets come from GitHub Settings → Secrets (you added these in Step 1)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      # Step 6: Upload built files to S3 (replaces the old files)
      # --delete removes old files that aren't in the new build
      - name: Deploy to S3
        run: aws s3 sync frontend/dist/ s3://seattleu-lf-frontend-534212415559 --delete

      # Step 7: Tell CloudFront to stop serving cached old files
      # Without this, users might see the old version for up to 24 hours
      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id EUEDGZE85D25A --paths "/*"

  # ============================================================
  # JOB 2: Deploy the Flask backend to EC2
  # ============================================================
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 1: Write the SSH key to a file so we can connect to EC2
      # The key is stored as a GitHub Secret, not in code
      # chmod 400 locks it down (same as you did on your laptop)
      - name: Set up SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 400 key.pem

      # Step 2: Copy app.py to EC2 using scp (same command you run manually)
      # StrictHostKeyChecking=no skips the "are you sure?" prompt
      - name: Copy backend code to EC2
        run: |
          scp -i key.pem -o StrictHostKeyChecking=no backend/app.py ec2-user@35.160.183.206:~/app.py

      # Step 3: SSH into EC2 and restart the Gunicorn service
      # This picks up the new code
      - name: Restart backend service
        run: |
          ssh -i key.pem -o StrictHostKeyChecking=no ec2-user@35.160.183.206 "sudo systemctl restart lostfound"

      # Step 4: Clean up the SSH key from the runner
      - name: Clean up
        run: rm -f key.pem
